experiment_name: centralized_baseline
seed: 42
method: centralized

# Data
use_fake_data: false
data_dir: data/processed/chest_xray
image_size: 224
train_size: 600
val_size: 150
test_size: 150

# Training
model_name: resnet18
num_classes: 2
batch_size: 16
num_workers: 0
epochs: 3
lr: 0.001
weight_decay: 0.0001
use_class_weights: true
sampling_strategy: none
loss_name: focal
focal_gamma: 2.0
focal_alpha:
threshold_tuning: true
selection_metric: balanced_accuracy
threshold_metric: balanced_accuracy
threshold_strategy: target_specificity
threshold_min: 0.0
threshold_max: 1.0
threshold_step: 0.01
min_specificity: 0.4
target_specificity: 0.4
target_recall:
calibration_methods:
  - none
  - temperature
  - platt
  - isotonic
calibration_selection_metric: ece
calibration_bins: 15
fp_cost: 1.0
fn_cost: 5.0
early_stopping_patience: 3
device: cpu

# Output
output_root: results
