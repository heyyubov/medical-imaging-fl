experiment_name: centralized_baseline
seed: 42
method: centralized

# Data
use_fake_data: false
data_dir: data/processed/chest_xray
image_size: 224
train_size: 600
val_size: 150
test_size: 150

# Training
model_name: resnet18
num_classes: 2
batch_size: 16
num_workers: 0
epochs: 3
lr: 0.001
weight_decay: 0.0001
use_class_weights: true
threshold_tuning: true
selection_metric: balanced_accuracy
threshold_metric: balanced_accuracy
threshold_min: 0.1
threshold_max: 0.9
threshold_step: 0.02
device: cpu

# Output
output_root: results
